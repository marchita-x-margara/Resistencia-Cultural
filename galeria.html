<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galería</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
 
    body {
  background-image: url('galeria.jpg') !important;
      font-family: 'Courier New', monospace;
      padding: 0;
      min-height: 100vh;
    }
 .header-secundario .nav-secundario a{
  position: static;
  padding: 8px 12px;
  font-size: 1rem;
  font-family: "nav";
  text-decoration: none;
  color: rgb(255, 255, 255)!important;
}
    .titulo-seccion {
      position: fixed;
      top: 2rem;
      right: 1.5rem;
      font-family: 'Special Elite', cursive;
      font-size: 2rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      z-index: 200;
      color:#fff
    }
 
    .gallery {
      display: grid !important;
      grid-template-columns: repeat(6, 1fr) !important;
      grid-auto-rows: 220px !important;
      gap: 4px !important;
      width: 100% !important;
       margin-top: 100px;
    }
    .photo-item   { grid-column: span 2; grid-row: span 1; position: relative !important; overflow: hidden !important; cursor: pointer; background: #000; }
    .photo-item.b { grid-column: span 3; }
    .photo-item.e { grid-column: span 4; }
 
    .photo-item img.real {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 2;
    }
    .photo-item canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      z-index: 3;
      transition: opacity 0.2s ease;
    }
    .photo-item:hover img.real { opacity: 1; }
    .photo-item:hover canvas   { opacity: 0; }
 
    #lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000; justify-content: center; align-items: center; cursor: zoom-out;
    }
    #lightbox.active { display: flex; }
    #lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border: 3px solid #fff; }
    #lightbox-close {
      position: fixed; top: 1.5rem; right: 1.5rem;
      color: #fff; font-size: 2.5rem; cursor: pointer;
      font-family: 'Courier New', monospace; line-height: 1;
      z-index: 1001; background: none; border: none;
    }
  </style>
</head>
<body>
 
<header class="header-secundario">
  <nav class="nav-secundario">
  <a href="juego/index.html">JUGAR</a>
  <span>·</span>

  <a href="proceso.html">PROCESO</a>
  <span>·</span>

  <a href="porque.html">POR QUÉ?</a>
  <span>·</span>

  <a href="botonete.html">WAINER</a>
  <span>·</span>

  <a href="festilunar.html">FESTI LUNAR</a>

  <a href="index.html">INICIO</a>
  <span>·</span>
</nav>
</header>
 
<h1 class="titulo-seccion">× GALERÍA ×</h1>
 
<div class="gallery" id="gallery"></div>
 
<div id="lightbox">
  <button id="lightbox-close" aria-label="Cerrar">&times;</button>
  <img id="lightbox-img" src="" alt="Foto ampliada">
</div>
 
<script>
const p = [
  'b','b',         // 2
  'a','a','a',     // 3
  'e','a',         // 2
  'b','b',         // 2
  'a','a','a',     // 3
  'a','e',         // 2
  'b','b',         // 2
  'a','a','a',     // 3
  'e','a',         // 2
  'b','b',         // 2
  'a','a','a',     // 3
  'b','b',         // 2
  'a','a',         // 2 → total 32 ✓
  'a','a','a',     // 3
   'a','a', 
];
 
const gallery     = document.getElementById('gallery');
const lightbox    = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
 
const images = Array.from({length: 36}, (_, i) => `galeria (${i + 1}).jpg`);
 
function applyPhotocopy(img, canvas) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width  = canvas.offsetWidth  || 300;
  const H = canvas.height = canvas.offsetHeight || 300;
  ctx.drawImage(img, 0, 0, W, H);
  const data = ctx.getImageData(0, 0, W, H);
  const d = data.data;
  for (let i = 0; i < d.length; i += 4) {
    let lum = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
    lum += (Math.random() - 0.5) * 40;  // grano suave
    const threshold = 80; 
    const val = lum < threshold ? 0 : 255;
    d[i] = d[i+1] = d[i+2] = val;
    d[i+3] = val === 255 ? 200 + Math.floor(Math.random() * 55) : 255;
  }
  ctx.putImageData(data, 0, 0);
  const n = Math.floor(Math.random() * 3);
  for (let s = 0; s < n; s++) {
    ctx.fillStyle = `rgba(0,0,0,${0.05 + Math.random() * 0.12})`;
    ctx.fillRect(Math.random() * W, 0, 1 + Math.random() * 2, H);
  }
}
 
function createItem(src, index) {
  const item = document.createElement('div');
  item.className = `photo-item ${p[index]}`;
  const realImg = document.createElement('img');
  realImg.className = 'real';
  realImg.src = src;
  realImg.alt = '';
  const canvas = document.createElement('canvas');
  item.appendChild(realImg);
  item.appendChild(canvas);
  const render = () => requestAnimationFrame(() => {
    canvas.width  = item.offsetWidth  || 300;
    canvas.height = item.offsetHeight || 300;
    applyPhotocopy(realImg, canvas);
  });
  realImg.addEventListener('load', render);
  if (realImg.complete && realImg.naturalWidth > 0) render();
  item.addEventListener('click', () => {
    lightboxImg.src = src;
    lightbox.classList.add('active');
  });
  return item;
}
 
images.forEach((src, i) => gallery.appendChild(createItem(src, i)));
 
lightbox.addEventListener('click', e => {
  if (e.target === lightbox || e.target.id === 'lightbox-close') {
    lightbox.classList.remove('active');
    lightboxImg.src = '';
  }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') lightbox.classList.remove('active');
});
</script>
</body>
</html>
